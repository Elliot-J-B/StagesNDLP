  <rect x="210" y="148" width="18" height="18" fill="#E0E7FF" rx="2"/>
  <rect x="237" y="148" width="18" height="18" fill="#E0E7FF" rx="2"/>
  <rect x="210" y="176" width="18" height="18" fill="#E0E7FF" rx="2"/>
