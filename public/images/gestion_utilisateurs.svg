<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Illustration gestion utilisateurs</title>
  <desc>Plusieurs profils d'utilisateurs avec rôles et permissions</desc>

  <rect x="0" y="0" width="680" height="300" fill="#F0FDF4" rx="12"/>

  <!-- Central gear -->
  <circle cx="340" cy="148" r="38" fill="#16A34A" opacity="0.15"/>
  <circle cx="340" cy="148" r="26" fill="#16A34A" opacity="0.25"/>
  <circle cx="340" cy="148" r="14" fill="#16A34A"/>
  <rect x="334" y="107" width="12" height="16" fill="#16A34A" rx="3"/>
  <rect x="334" y="173" width="12" height="16" fill="#16A34A" rx="3"/>
  <rect x="299" y="141" width="16" height="12" fill="#16A34A" rx="3"/>
  <rect x="365" y="141" width="16" height="12" fill="#16A34A" rx="3"/>
  <rect x="310" y="116" width="16" height="12" fill="#16A34A" rx="3" transform="rotate(45 318 122)"/>
  <rect x="354" y="116" width="16" height="12" fill="#16A34A" rx="3" transform="rotate(-45 362 122)"/>
  <rect x="310" y="168" width="16" height="12" fill="#16A34A" rx="3" transform="rotate(-45 318 174)"/>
  <rect x="354" y="168" width="16" height="12" fill="#16A34A" rx="3" transform="rotate(45 362 174)"/>
  <rect x="332" y="144" width="16" height="12" fill="white" rx="2"/>
  <path d="M336 144 v-4 a4 4 0 0 1 8 0 v4" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- User 1 — Admin -->
  <circle cx="115" cy="100" r="28" fill="#059669"/>
  <circle cx="115" cy="90" r="11" fill="white"/>
  <ellipse cx="115" cy="115" rx="18" ry="10" fill="white"/>
  <rect x="65" y="138" width="100" height="28" fill="#059669" rx="14"/>
  <text x="115" y="157" text-anchor="middle" font-size="12" font-weight="500" fill="white" font-family="sans-serif">Admin</text>

  <!-- User 2 — Tuteur -->
  <circle cx="115" cy="215" r="28" fill="#0D9488"/>
  <circle cx="115" cy="205" r="11" fill="white"/>
  <ellipse cx="115" cy="230" rx="18" ry="10" fill="white"/>
  <rect x="65" y="253" width="100" height="28" fill="#0D9488" rx="14"/>
  <text x="115" y="272" text-anchor="middle" font-size="12" font-weight="500" fill="white" font-family="sans-serif">Tuteur</text>

  <!-- User 3 — Étudiant -->
  <circle cx="568" cy="100" r="28" fill="#7C3AED"/>
  <circle cx="568" cy="90" r="11" fill="white"/>
  <ellipse cx="568" cy="115" rx="18" ry="10" fill="white"/>
  <rect x="518" y="138" width="100" height="28" fill="#7C3AED" rx="14"/>
  <text x="568" y="157" text-anchor="middle" font-size="12" font-weight="500" fill="white" font-family="sans-serif">Étudiant</text>

  <!-- User 4 — Entreprise -->
  <circle cx="568" cy="215" r="28" fill="#B45309"/>
  <circle cx="568" cy="205" r="11" fill="white"/>
  <ellipse cx="568" cy="230" rx="18" ry="10" fill="white"/>
  <rect x="518" y="253" width="100" height="28" fill="#B45309" rx="14"/>
  <text x="568" y="272" text-anchor="middle" font-size="12" font-weight="500" fill="white" font-family="sans-serif">Entreprise</text>

  <!-- Lines -->
  <line x1="143" y1="107" x2="305" y2="140" stroke="#059669" stroke-width="1.8" stroke-dasharray="5,3"/>
  <line x1="143" y1="222" x2="305" y2="158" stroke="#0D9488" stroke-width="1.8" stroke-dasharray="5,3"/>
  <line x1="540" y1="107" x2="375" y2="140" stroke="#7C3AED" stroke-width="1.8" stroke-dasharray="5,3"/>
  <line x1="540" y1="222" x2="375" y2="158" stroke="#B45309" stroke-width="1.8" stroke-dasharray="5,3"/>

  <!-- Label -->
  <text x="340" y="270" text-anchor="middle" font-size="15" font-weight="500" fill="#166534" font-family="sans-serif">Gestion des utilisateurs &amp; rôles</text>
</svg>
